<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi tienda</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Hola mundo</h1>

    <!-- FORMULARIO -->
    <form action="procesar.php" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required>

        <br><br>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" required>

        <br><br>

        <button type="submit">Enviar al servidor</button>
    </form>

    <!-- TARJETA PRODUCTO -->
    <div class="product-card">
        <div class="image-card" id="imageCard" style="background-image: url('imagenes/mercedex.jpg');"></div>

        <h2>Mercedes Benz C300</h2>

        <div class="colors">
            <span class="color-option red-btn">
                <span class="circle red"></span> Rojo
            </span>

            <span class="color-option gray-btn">
                <span class="circle gray"></span> Gris
            </span>
        </div>

        <button id="cartButton">Agregar al carrito</button>
    </div>

    <!-- JS -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const redColor = document.querySelector('.red-btn');
            const grayColor = document.querySelector('.gray-btn');
            const cartButton = document.getElementById('cartButton');
            const imageCard = document.getElementById('imageCard');

            redColor.addEventListener('click', function() {
                cartButton.style.backgroundColor = 'red';
                imageCard.style.backgroundImage = "url('imagenes/40543ad341c7ad9b85737cf1254c2d0f.jpg')";
            });

            grayColor.addEventListener('click', function() {
                cartButton.style.backgroundColor = '#222';
                imageCard.style.backgroundImage = "url('imagenes/mercedex.jpg')";
            });
        });
    </script>

</body>
</html>
